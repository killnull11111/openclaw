name: 仅编译安卓APK
on:
  # 开启手动触发按钮（核心！）
  workflow_dispatch:

# 只运行安卓构建任务
jobs:
  build-android-apk:
    runs-on: self-hosted
    name: 编译安卓APK
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          
      - name: 安装Java环境
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
          
      - name: 编译安卓APK
        run: |
          cd apps/android
          chmod +x gradlew
          ./gradlew assembleDebug
          
      - name: 上传APK安装包
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-android-apk
          path: apps/android/app/build/outputs/apk/debug/*.apk
