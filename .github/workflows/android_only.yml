name: 仅编译安卓APK
on:
  workflow_dispatch:

jobs:
  build-android-apk:
    runs-on: self-hosted
    name: 编译安卓APK
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          
      - name: 安装Java环境（修复版）
        # 降级到v3，完美兼容CentOS7
        uses: actions/setup-java@v3
        with:
          # 固定Java 17.0.10版本，避免自动解析最新版
          java-version: '17.0.10+7'
          distribution: 'temurin'
          # 使用国内清华镜像，解决网络超时
          repo: https://mirrors.tuna.tsinghua.edu.cn/Adoptium/
          
      - name: 编译安卓APK
        run: |
          cd apps/android
          chmod +x gradlew
          ./gradlew assembleDebug
          
      - name: 上传APK安装包
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-android-apk
          path: apps/android/app/build/outputs/apk/debug/*.apk
